<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A minimalist, self-hosted portfolio site & blog." />
    <title>Home • SEDK.dev</title>
    <style>
      :root {
        --bg: #000;
        --fg: #f5f5f5;
        --accent: #a5b4fc;
        --body: #a1a1aa;
        --focus-ring: #a5b4fc;

        --fs-display: clamp(2.75rem, 11vw, 5.5rem);
        --fs-meta: clamp(0.875rem, 2.2vw, 1rem);
        --fs-badge: clamp(0.75rem, 1.8vw, 0.875rem);

        --space-sm: clamp(0.75rem, 1.8vw, 1rem);
        --space-md: clamp(1rem, 2.5vw, 1.5rem);
        --space-lg: clamp(1.5rem, 4vw, 2.5rem);

        --radius-pill: 9999px;
        --focus-outline: 2px solid var(--focus-ring);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        padding: var(--space-lg);
        line-height: 1.6;
      }

      .container {
        width: fit-content;
        max-width: 820px;
      }

      .header-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-lg);
        width: fit-content;
      }

      h1 {
        font-size: var(--fs-display);
        font-weight: 600;
        line-height: 0.9;
        letter-spacing: -0.045em;
        margin-left: -0.05em;
        /* margin-right: -0.03em; */
      }

      .meta {
        display: flex;
        align-items: center;
        width: 100%;
        gap: var(--space-md);
        flex-wrap: wrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        background: color-mix(in srgb, var(--accent) 8%, transparent);
        color: var(--accent);
        font-size: var(--fs-badge);
        font-weight: 600;
        letter-spacing: 0.025em;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-pill);
        border: 1px solid color-mix(in srgb, var(--accent) 12%, transparent);
        white-space: nowrap;
      }

      nav a {
        color: var(--body);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        font-size: var(--fs-meta);
        outline: none;
        border-radius: 3px;
      }

      nav a:hover {
        color: var(--fg);
      }

      nav a:focus-visible {
        outline: var(--focus-outline);
        outline-offset: 5px;
      }

      /* Mobile */
      @media (max-width: 480px) {
        body {
          padding-left: var(--space-md);
          padding-right: var(--space-md);
          display: grid;
          place-items: center;
        }

        .container {
          width: fit-content;
          max-width: 100%;
        }

        .header-group {
          gap: var(--space-md);
          align-items: flex-start;
        }

        h1 {
          margin-left: -0.03em;
        }

        .meta {
          flex-direction: column;
          align-items: flex-start;
          justify-content: flex-start;
          gap: var(--space-sm);
          width: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="header-group">
        <h1>Homepage</h1>
        <div class="meta">
          <span class="badge">UNDER DEVELOPMENT • SELF-HOSTED</span>
          <nav aria-label="Quick links">
            <a href="https://ds.sedk.dev">Design system</a>
          </nav>
        </div>
      </header>
    </main>
  </body>
</html>
