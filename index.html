<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - SEDK.dev</title>
    <meta
      name="description"
      content="Documenting rigorous self-study and building in public." />

    <meta property="og:title" content="Home - SEDK.dev" />
    <meta
      property="og:description"
      content="Documenting rigorous self-study and building in public." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sedk.dev/" />
    <meta property="og:site_name" content="SEDK.dev" />
    <meta property="og:image" content="https://sedk.dev/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Home - SEDK.dev" />
    <meta
      name="twitter:description"
      content="Documenting rigorous self-study and building in public." />
    <meta name="twitter:image" content="https://sedk.dev/og.png" />

    <style>
      :root {
        --bg: #000;
        --fg: #fff;
        --accent: #559395;
        --fg-body: #a1a1aa;
        --focus-ring: #a5b4fc;
        --fs-h1: clamp(2.5rem, 11vw, 5rem);
        --fs-md: clamp(0.875rem, 2.2vw, 1rem);
        --fs-sm: clamp(0.75rem, 1.8vw, 0.875rem);
        --fs-body: var(--fs-md);
        --space-sm: clamp(0.75rem, 1.8vw, 1rem);
        --space-md: clamp(1rem, 2.5vw, 1.5rem);
        --space-lg: clamp(1.5rem, 4vw, 2.5rem);
        --radius-pill: 9999px;
        --focus-outline: 2px solid var(--focus-ring);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--fg);
        background-color: var(--bg);
        min-height: 100dvh;
        height: 100dvh;
        line-height: 1.6;
        display: grid;
        place-items: center;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background: url("bg.png") center / cover no-repeat;
        background-color: #000;
        transform: scaleY(0.7);
        transform-origin: bottom;
        filter: brightness(0.3) blur(10px);
        transition:
          transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.45s ease-out;
        will-change: transform, filter;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        height: 150vh;
        z-index: -1;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.9) 30%,
          rgba(0, 0, 0, 0.5) 60%,
          transparent 100%
        );
        transform: translateY(0);
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      body.loaded::before {
        transform: scaleY(1);
        filter: brightness(1) blur(0px);
      }

      body.loaded::after {
        transform: translateY(-110%);
      }

      header {
        position: absolute;
        top: var(--space-sm);
        left: var(--space-sm);
        right: var(--space-sm);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: var(--space-sm);
        z-index: 10;
      }

      .status {
        color: var(--accent);
        font-size: var(--fs-sm);
        letter-spacing: 0.1em;
      }

      nav a {
        color: var(--fg-body);
        text-decoration: underline;
        font-size: var(--fs-body);
      }

      nav a:hover {
        color: var(--fg);
      }
      nav a:focus-visible {
        outline: var(--focus-outline);
        outline-offset: 4px;
      }

      @media (max-width: 650px) {
        header {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
      }

      .container {
        width: 100%;
        max-width: 820px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--space-lg);
        position: relative;
        z-index: 10;
      }

      h1 {
        font-size: var(--fs-h1);
        font-weight: 600;
        line-height: 0.95;
        letter-spacing: -0.045em;
        margin-left: -0.05em;
      }

      .byline {
        color: var(--fg);
        font-size: var(--fs-md);
        margin-top: 0.5rem;
      }

      .intro {
        color: var(--fg-body);
        font-size: var(--fs-md);
        margin-top: 1.5rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="status">UNDER DEVELOPMENT • SELF-HOSTED</span>
      <nav aria-label="Quick links">
        <a href="https://ds.sedk.dev">Design system</a>
      </nav>
    </header>

    <main class="container">
      <h1>SEDK</h1>
      <p class="byline">
        [&nbsp;&nbsp;Mathematics • Physics • Systems&nbsp;&nbsp;]
      </p>
      <p class="intro">
        Documenting rigorous self-study and building in public.
      </p>
    </main>

    <script>
      window.addEventListener("load", () => {
        document.body.classList.add("loaded");
      });
      setTimeout(() => {
        if (!document.body.classList.contains("loaded")) {
          document.body.classList.add("loaded");
        }
      }, 800);
    </script>
  </body>
</html>
