<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World — sedk.dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --bg: #000;
            --fg: #f5f5f5;
            --accent: #a5b4fc;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            max-width: 720px;
            padding: 2rem;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 600;
            margin: 0 0 1rem;
            letter-spacing: -0.025em;
        }
        
        p {
            font-size: 1.25rem;
            color: #a1a1aa;
            max-width: 520px;
            margin: 0 auto 2rem;
            line-height: 1.5;
        }
        
        .badge {
            display: inline-block;
            background: #18181b;
            color: #a5b4fc;
            font-size: 0.875rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">EXPERIMENTAL • SELF-HOSTED</div>
        <h1>Hello World</h1>
    </div>
</body>
</html>
