<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - SEDK.dev</title>

    <!-- SEO + Social -->
    <meta
      name="description"
      content="Documenting rigorous self-study and building in public." />

    <!-- Open Graph -->
    <meta property="og:title" content="Home - SEDK.dev" />
    <meta
      property="og:description"
      content="Documenting rigorous self-study and building in public." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sedk.dev/" />
    <meta property="og:site_name" content="SEDK.dev" />
    <meta property="og:image" content="https://sedk.dev/og.png" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Home - SEDK.dev" />
    <meta
      name="twitter:description"
      content="Documenting rigorous self-study and building in public." />
    <meta name="twitter:image" content="https://sedk.dev/og.png" />

    <style>
      :root {
        /* Colors */
        --bg: #000;
        --fg: #fff;
        --accent: #559395;
        --fg-body: #a1a1aa;
        --focus-ring: #a5b4fc;

        /* Fluid type & space */
        --fs-h1: clamp(3rem, 15vw, 5rem);
        --fs-md: clamp(0.875rem, 2.2vw, 1rem);
        --fs-sm: clamp(0.75rem, 1.8vw, 0.875rem);
        --space-sm: clamp(0.75rem, 1.8vw, 1rem);
        --space-md: clamp(1rem, 2.5vw, 1.5rem);
        --space-lg: clamp(1.5rem, 4vw, 2.5rem);

        /* Misc */
        --radius-pill: 9999px;
        --focus-outline: 2px solid var(--focus-ring);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--fg);
        background-color: var(--bg);
        min-height: 100dvh;
        line-height: 1.6;
        display: grid;
        place-items: center;
        position: relative;
        overflow-x: hidden;
      }

      /* Background layer (scaled + blurred initially) */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background: url("bg.png") center/100% 100% no-repeat;
        background-color: #000;
        transform: scaleY(0.7);
        transform-origin: bottom;
        filter: brightness(0.3) blur(10px);
        transition:
          transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.45s ease-out;
        will-change: transform, filter;
      }

      /* Dark gradient overlay that slides up on load */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        height: 150vh;
        z-index: -1;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.9) 30%,
          rgba(0, 0, 0, 0.5) 60%,
          transparent 100%
        );
        transform: translateY(0);
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      /* Loaded state — reveal the full background */
      body.loaded::before {
        transform: scaleY(1);
        filter: brightness(1) blur(0px);
      }

      body.loaded::after {
        transform: translateY(-110%);
      }

      /* Accessibility: respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        body::before,
        body::after {
          transition: none !important;
        }
        body::before {
          transform: scaleY(1);
          filter: brightness(1) blur(0px);
        }
        body::after {
          transform: translateY(-110%);
        }
      }

      /* Header */
      header {
        position: absolute;
        top: var(--space-sm);
        left: var(--space-sm);
        right: var(--space-sm);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: var(--space-sm);
        z-index: 10;
      }

      .status {
        color: var(--accent);
        font-size: var(--fs-sm);
        letter-spacing: 0.1em;
        white-space: nowrap;
      }

      nav a {
        color: var(--fg-body);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        font-size: var(--fs-md);
        white-space: nowrap;
      }

      nav a:hover {
        color: var(--fg);
      }

      nav a:focus-visible {
        outline: var(--focus-outline);
        outline-offset: 4px;
      }

      /* Mobile adjustments */
      @media (max-width: 650px) {
        header {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        body::before {
          background: url("bg.png") center/auto 100% no-repeat;
        }
      }

      /* Taller / less-wide viewports */
      @media (max-aspect-ratio: 16/9) {
        body::before {
          background-size: auto 100%;
        }
      }

      /* Main content */
      .container {
        width: 100%;
        max-width: 820px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--space-lg);
        position: relative;
        z-index: 10;
      }

      /* --- Updated H1 Styles --- */
      h1 {
        /* Mirror-esque gradient: Bright top, transparent middle, reflective bottom */
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(13, 17, 19, 0.4) 35%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(85, 147, 149, 0.1) 65%,
          rgba(229, 132, 100, 0.4) 80%,
          rgba(214, 52, 23, 0.7) 90%,
          rgba(243, 154, 119, 0.6) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 0 rgba(0, 0, 0, 0.1);

        font-size: var(--fs-h1);
        font-weight: 700;
        line-height: 0.85;
        text-align: center;
        margin-bottom: 2rem;
      }

      /* --- Tightened Typography Spacing --- */
      .byline {
        color: var(--fg);

        font-size: var(--fs-md);
        margin-top: 0; /* Pulled up closer to H1 */
        letter-spacing: 0.05em;
        opacity: 0.9;
      }

      .intro {
        color: var(--fg-body);
        font-size: var(--fs-md);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="status">UNDER DEVELOPMENT • SELF-HOSTED</span>
      <nav aria-label="Quick links">
        <a href="https://ds.sedk.dev" rel="noopener">Design system</a>
      </nav>
    </header>

    <main class="container">
      <h1>SEDK</h1>
      <p class="byline">
        [&nbsp;&nbsp;Mathematics • Physics • Systems&nbsp;&nbsp;]
      </p>
      <p class="intro">
        Documenting rigorous self-study and building in public.
      </p>
    </main>

    <script>
      // Add loaded class as soon as possible
      const addLoaded = () => document.body.classList.add("loaded");

      if (document.readyState === "complete") {
        addLoaded();
      } else {
        window.addEventListener("load", addLoaded, { once: true });
      }

      // Safety net (in case load event is delayed)
      setTimeout(addLoaded, 800);
    </script>
  </body>
</html>
