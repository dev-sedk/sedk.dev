<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World — sedk.dev</title>
    <style>
      :root {
        --bg: #000;
        --fg: #fff;
        --accent: #a5b4fc;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: left;
      }

      .container {
        max-width: 720px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start; /* ← this prevents children from stretching full width */
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 600;
        margin: 0;
        text-indent: -0.1em;
        letter-spacing: -0.025em;
      }

      a {
        color: #a0a0a0;
        /* text-decoration kept */
      }

      a:hover {
        color: #ddd;
      }

      .badge {
        width: fit-content;
        background: rgb(from var(--accent) r g b / 0.1);
        color: var(--accent);
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        font-weight: 500;
        border: 1px solid rgb(from var(--accent) r g b / 0.15);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">UNDER DEVELOPMENT • SELF-HOSTED</div>
      <h1>Hello, World!</h1>
      <a href="https://ds.sedk.dev">Design System documentation</a>
    </div>
  </body>
</html>
