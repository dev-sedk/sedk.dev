<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - SEDK.dev</title>
    <link rel="icon" href="./dev.jpg" />

    <meta
      name="description"
      content="Documenting rigorous self-study and building in public." />

    <!-- Open Graph -->
    <meta property="og:title" content="Home - SEDK.dev" />
    <meta
      property="og:description"
      content="Documenting rigorous self-study and building in public." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sedk.dev/" />
    <meta property="og:image" content="https://sedk.dev/og.png" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Home - SEDK.dev" />
    <meta
      name="twitter:description"
      content="Documenting rigorous self-study and building in public." />
    <meta name="twitter:image" content="https://sedk.dev/og.png" />

    <style>
      :root {
        --bg: #000;
        --fg: #fff;
        --accent: #559395;
        --fg-body: #a1a1aa;
        --focus-ring: #a5b4fc;

        /* Fluid type */
        --fs-h1: clamp(3rem, 15vw, 5rem);
        --fs-md: clamp(0.875rem, 2.2vw, 1rem);
        --fs-sm: clamp(0.75rem, 1.8vw, 0.875rem);

        /* Spacing */
        --space-sm: clamp(0.75rem, 1.8vw, 1rem);
        --space-md: clamp(1rem, 2.5vw, 1.5rem);
        --space-lg: clamp(1.5rem, 4vw, 2.5rem);

        --focus-outline: 2px solid var(--focus-ring);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--fg);
        background-color: var(--bg);
        min-height: 100dvh;
        line-height: 1.6;
        display: grid;
        place-items: center;
        position: relative;
        overflow-x: hidden;
        padding: var(--space-lg) 0;
      }

      /* Background Layer - Starts black and blurred */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: url("bg.webp") center/100% 100% no-repeat;
        background-color: #000;
        filter: brightness(0);
        transform: scale(1.05); /* Slight zoom for the "settling" effect */
        transition:
          filter 1.2s cubic-bezier(0.22, 1, 0.36, 1),
          transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: filter, transform;
      }

      /* State: Loaded - Reveal image */
      body.loaded::before {
        filter: brightness(1);
        transform: scale(1);
      }

      /* Accessibility: No movement or heavy filters */
      @media (prefers-reduced-motion: reduce) {
        body::before {
          transition: none !important;
          filter: brightness(1);
          transform: scale(1);
        }
      }

      header {
        position: absolute;
        top: var(--space-sm);
        left: var(--space-sm);
        right: var(--space-sm);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }

      .status {
        color: var(--accent);
        font-size: var(--fs-sm);
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      nav a {
        color: var(--fg-body);
        text-decoration: underline;
        text-underline-offset: 4px;
        font-size: var(--fs-md);
        transition: color 0.2s;
      }

      nav a:hover {
        color: var(--fg);
      }

      .container {
        width: 100%;
        max-width: 820px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--space-lg);
        text-align: center;
        z-index: 10;
      }

      h1 {
        font-size: var(--fs-h1);
        font-weight: 600;
        line-height: 1;
        margin-bottom: 1rem;
      }

      .byline {
        font-size: var(--fs-md);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        opacity: 0.8;
        display: flex;
        align-items: center;
        gap: 1.5rem; /* Replaces the &nbsp; hacks */
      }

      .byline::before {
        content: "[";
        color: var(--accent);
        margin-right: -0.5rem;
      }
      .byline::after {
        content: "]";
        color: var(--accent);
        margin-left: -0.5rem;
      }

      .intro {
        color: var(--fg-body);
        font-size: var(--fs-md);
        max-width: 40ch;
      }

      @media (max-width: 650px) {
        /* Background Layer - Starts black and blurred */
        body::before {
          background: url("bg.webp") center/auto 100% no-repeat;
        }
        header {
          flex-direction: column;
          gap: var(--space-sm);
        }
        .byline {
          gap: 0.75rem;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span class="status">In development</span>
      <nav aria-label="Quick links">
        <a href="https://ds.sedk.dev" rel="noopener">Design System</a>
      </nav>
    </header>

    <main class="container">
      <h1>SEDK</h1>
      <p class="byline">Mathematics • Physics • Systems</p>
      <p class="intro">
        Documenting rigorous self-study and building in public.
      </p>
    </main>

    <script>
      const addLoaded = () => document.body.classList.add("loaded");

      if (document.readyState === "complete") {
        addLoaded();
      } else {
        window.addEventListener("load", addLoaded, { once: true });
      }

      // Safety net for assets
      setTimeout(addLoaded, 1200);
    </script>
  </body>
</html>
